<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Document</title>
</head>
<body>
    
    <div class="container">
 
        <div class="screen">

         <div class="previous-operand"></div>
         <div class="current-operand">0</div>
        
        </div>


        <div class="keyboard">

            <button class="btn_clear">AC</button>
            <button class="btn_delete">DEL</button>
            <button class="btn_operator">/</button>

            <button class="btn_number">7</button>
            <button class="btn_number">8</button>
            <button class="btn_number">9</button>
            <button class="btn_operator">*</button>

            <button class="btn_number">4</button>
            <button class="btn_number">5</button>
            <button class="btn_number">6</button>
            <button class="btn_operator">-</button>

            <button class="btn_number">1</button>
            <button class="btn_number">2</button>
            <button class="btn_number">3</button>
            <button class="btn_operator">+</button>

            <button class="btn_number zero">0</button>
            <button class="btn_decimal">.</button>
            <button class="btn_equals">=</button>

        </div>







    </div>


</body>
</html>
